<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>we managing numbers</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Number Manager?</h1>

    <div class="controls">
      <input id="numberInput" type="number" placeholder="Enter a number" />
      <button id="addBtn">Add it</button>
      <button id="resetBtn">Reset it</button>
    </div>

    <p id="message"></p>

    <div class="summary">
      <p>Total items: <span id="totalCount">0</span></p>
      <p>Odd sum: <span id="oddSum">0</span></p>
      <p>Even sum: <span id="evenSum">0</span></p>
    </div>

    <ul id="numberList"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
