<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anime Quote Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Anime Quote Generator</h1>


    <div class="form-box">
      <input id="charInput" type="text" placeholder="Character name" />
      <input id="animeInput" type="text" placeholder="Anime name" />
      <textarea id="quoteInput" placeholder="Write the quote"></textarea>
      <button id="addBtn">Add Quote</button>
      <p id="errorMsg"></p>
    </div>

    <button id="generateBtn">Generate a Quote</button>

    <div id="outputBox">
      <p id="quoteOutput">Which Quote would you recieve first ay?</p>
      <p id="infoOutput"></p>
    </div>
  </div>

  <footer><button id="themeBtn">Dark Mode</button></footer>

  <script src="script.js"></script>
</body>
</html>
